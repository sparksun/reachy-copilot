<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Robot head -->
  <rect x="4" y="6" width="16" height="12" rx="3" fill="#7c6ff7"/>
  <!-- Eyes -->
  <circle cx="9" cy="11" r="2" fill="#fff"/>
  <circle cx="15" cy="11" r="2" fill="#fff"/>
  <circle cx="9.8" cy="11" r="1" fill="#7c6ff7"/>
  <circle cx="15.8" cy="11" r="1" fill="#7c6ff7"/>
  <!-- Mouth -->
  <rect x="8" y="14.5" width="8" height="1.5" rx="0.75" fill="#fff" opacity="0.7"/>
  <!-- Antenna -->
  <line x1="12" y1="6" x2="12" y2="3" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12" cy="2.5" r="1" fill="#a78bfa"/>
  <!-- Chat bubble indicator -->
  <circle cx="20" cy="5" r="3.5" fill="#06b6d4"/>
  <text x="20" y="6.5" text-anchor="middle" font-size="4" fill="white" font-family="sans-serif">...</text>
</svg>
